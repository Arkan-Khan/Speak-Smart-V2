<!DOCTYPE html>
<html lang="mr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ═══════════════════════════════════════════
         PRIMARY META
    ═══════════════════════════════════════════ -->
    <title>Speak Smart | Spoken English Skill Development Training</title>
    <meta name="title"       content="Speak Smart | Spoken English Skill Development Training" />

    <!-- ═══════════════════════════════════════════

    ═══════════════════════════════════════════ -->
    <link rel="icon"             href="/logo.png" type="image/png" />
    <link rel="shortcut icon"    href="/logo.png" type="image/png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <meta property="og:url"         content="https://www.speak-smart.co.in/" />

    ═══════════════════════════════════════════ -->

    <!-- ═══════════════════════════════════════════
         STRUCTURED DATA — Organization
    ═══════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Speak Smart",
      "alternateName": "Ekalavya Academy",
      "url": "https://www.speak-smart.co.in/",
      "logo": "https://www.speak-smart.co.in/logo.png",
      "description": "Maharashtra's leading customized Spoken English E-Learning Application for rural students from Pre-School to College level.",
      "foundingDate": "2021",
      "founder": [
        {
          "@type": "Person",
          "name": "Reshma Dabholkar Damari",
          "jobTitle": "Founder & Head Coach"
        },
        {
          "@type": "Person",
          "name": "Capt. Omkar Dabholkar",
          "jobTitle": "Co-Founder"
        }
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+91-8600357700",
        "contactType": "customer support",
        "email": "speakenglishwithreshmad@gmail.com",
        "availableLanguage": ["English", "Marathi"]
      },
      "sameAs": [
        "https://www.facebook.com/speakenglishwithreshma",
        "https://www.instagram.com/speakenglishwithreshmad",
        "https://www.youtube.com/@speaksmart2021"
      ]
    }
    </script>

    <!-- ═══════════════════════════════════════════
         STRUCTURED DATA — EducationalOrganization / Products
    ═══════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "EducationalOrganization",
      "name": "Speak Smart",
      "url": "https://www.speak-smart.co.in/",
      "description": "Spoken English Skill Development Training for rural Maharashtra — Pre-School, Primary, Secondary and College level institutions.",
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Speak Smart Programs",
        "itemListElement": [
          {
            "@type": "Course",
            "name": "Pre-School Institutions — Spoken English Program",
            "description": "English communication training for pre-school institutions in rural Maharashtra.",
            "inLanguage": ["en", "mr"],
            "educationalLevel": "Pre-School",
            "provider": { "@type": "Organization", "name": "Speak Smart" }
          },
          {
            "@type": "Course",
            "name": "Primary Educational Institutions — Spoken English Program",
            "description": "English communication training for primary schools in rural Maharashtra.",
            "inLanguage": ["en", "mr"],
            "educationalLevel": "Primary Education",
            "provider": { "@type": "Organization", "name": "Speak Smart" }
          },
          {
            "@type": "Course",
            "name": "Secondary Educational Institutions — Spoken English Program",
            "description": "English communication training for secondary schools in rural Maharashtra.",
            "inLanguage": ["en", "mr"],
            "educationalLevel": "Secondary Education",
            "provider": { "@type": "Organization", "name": "Speak Smart" }
          },
          {
            "@type": "Course",
            "name": "College / University Institutions — Spoken English Program",
            "description": "English communication training for college and university students in rural Maharashtra.",
            "inLanguage": ["en", "mr"],
            "educationalLevel": "Higher Education",
            "provider": { "@type": "Organization", "name": "Speak Smart" }
          }
        ]
      }
    }
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
